name = "Repo_Analyzer_Array"

[[nodes]]
id = "GitClone"
task_type = "command"
weight = 1.0
params = { cmd = "if [ ! -d '{{repo_dir}}' ]; then git clone '{{repo_url}}' '{{repo_dir}}'; fi", output_key = "clone_output", allow_fail = false }

[[nodes]]
id = "TreeScanner"
task_type = "command"
weight = 1.0
# Using eza (or tree) to get a compact representation of the repository, excluding git and python cache
params = { cmd = "cd '{{repo_dir}}' && find . -maxdepth 3 -not -path '*/.git/*' -not -path '*/__pycache__/*' -not -path '*/node_modules/*' -not -path '*/target/*'", output_key = "repo_tree" }

[[nodes]]
id = "Architect"
task_type = "llm"
weight = 1.0
params = { model = "MiniMax-M2.5", role = "architect", output_key = "analysis_trace", parse_json_output = true, fallback_repo_tree_on_parse_failure = true, context_keys = ["repo_tree"], prompt = "Based on this repository tree, propose a logical sharding plan (3-5 subsystems) for deep architecture analysis. Return ONLY a JSON list of objects, each with 'shard_id' and 'paths' (list of directories/files)." }

[[nodes]]
id = "UserApproval"
task_type = "suspend"
weight = 1.0
params = { reason = "waiting_for_approval", prompt = "Please review the proposed architecture shards. Provide your approved JSON sharding plan to proceed.", resume_key = "approved_shards" }

[[nodes]]
id = "DeepAnalyze"
task_type = "command"
weight = 1.0
# In a real scenario, this would fan out. Here we use a python script to iterate over approved_shards, run repomix, and summarize.
# For simplicity in this array, we just echo the approved shards indicating the heavy lifting has started.
params = { cmd = "echo 'Starting deep analysis for shards: {{approved_shards}}'", output_key = "analysis_result" }

[[edges]]
from = "GitClone"
to = "TreeScanner"
weight = 1.0

[[edges]]
from = "TreeScanner"
to = "Architect"
weight = 1.0

[[edges]]
from = "Architect"
to = "UserApproval"
weight = 1.0

[[edges]]
from = "UserApproval"
to = "DeepAnalyze"
weight = 1.0
