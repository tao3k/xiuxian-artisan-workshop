[package]
name = "xiuxian-zhixing"
version.workspace = true
edition.workspace = true
description = "AI-driven Agenda and Journaling system for the Xiuxian ecosystem (Zhixing-Heyi)"
authors = ["CyberXiuXian Artisan Studio"]
license = "Apache-2.0"
publish = false

[dependencies]
# Async runtime
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "io-util", "fs"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true, features = ["clock", "serde"] }
chrono-tz = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
redis = { version = "1.0.3", default-features = false }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }
include_dir = { workspace = true }

# Org-mode parsing
orgize = "0.9"

# Local crates
omni-types = { path = "../omni-types" }
xiuxian-wendao = { path = "../xiuxian-wendao" }
xiuxian-qianhuan = { path = "../xiuxian-qianhuan" }
# xiuxian-llm = { path = "../xiuxian-llm" } # Assuming it's available

# Logging
log = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
xiuxian-qianji = { path = "../xiuxian-qianji", features = ["llm"] }

[lints]
workspace = true
