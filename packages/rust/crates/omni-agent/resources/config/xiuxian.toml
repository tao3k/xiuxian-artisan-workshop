# packages/rust/crates/omni-agent/resources/config/xiuxian.toml
# Xiuxian Engine Configuration
# Define LLM providers, search backends, and array configurations.

[llm]
default_provider = "minimax"
default_model = "MiniMax-M2.5"

[llm.providers.minimax]
# Base URL for the OpenAI compatible endpoint
base_url = "https://api.minimax.io/v1"
# Environment variable to read the API key from
api_key_env = "MINIMAX_API_KEY"
# Optional mapping for model names that need normalization
[llm.providers.minimax.model_aliases]
"minimax-m2.1-highspeed" = "MiniMax-M2.1-lightning"

[llm.providers.openai]
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"

[llm.providers.anthropic]
base_url = "https://api.anthropic.com/v1"
api_key_env = "ANTHROPIC_API_KEY"

[llm.providers.deepseek]
base_url = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"

[agent]
# Agenda validation preflight mode:
# - "always": always run strict-teacher validation when Zhixing runtime is available
# - "never": disable agenda validation preflight
# - "auto": use a lightweight LLM intent gate before running validation
agenda_validation_policy = "always"

[wendao.zhixing]
persona_id = "agenda_steward"
# Optional default reminder notification target when task metadata has no recipient.
# Examples:
# notification_recipient = "telegram:-1001234567890"
# notification_recipient = "discord:123456789012345678"
# Optional external template directories for override + hot reload.
# Built-in templates are embedded in the binary and do NOT require config.
# Use this only when you want runtime-editable templates.
# template_paths = ["~/.config/xiuxian-artisan-workshop/zhixing/templates"]

[wendao.link_graph]
# Optional: restrict hot-reload incremental sync by extension when
# watch_patterns is omitted. Patterns will be auto-derived as `**/*.<ext>`.
watch_extensions = ["md", "markdown", "org", "orgm", "j2", "toml"]

[qianhuan.persona]
persona_dir = "~/.config/xiuxian-artisan-workshop/personas"

[qianhuan.template]
template_dir = "~/.config/xiuxian-artisan-workshop/qianhuan/templates"

[zhenfa]
# Native zhenfa registry defaults.
enabled_tools = ["wendao.search", "qianhuan.render", "qianhuan.reload"]

[zhenfa.valkey]
# Valkey hooks for zhenfa native orchestrator (cache + lock + audit stream).
url = "redis://127.0.0.1:6379/0"
key_prefix = "xiuxian:zhenfa"
cache_ttl_seconds = 120
lock_ttl_seconds = 15
audit_stream = "dispatch.audit"

[telegram]
# Webhook bind for channel launcher; user config can override this value.
webhook_bind = "127.0.0.1:18081"

[gateway]
# Native Rust gateway bind used by webhook launcher when env is not provided.
bind = "127.0.0.1:18092"

[llm.embedding]
# Rust embedding backend mode:
# - mistral_sdk: in-process mistralrs SDK (loads model directly in agent process)
# - litellm_rs: provider routing (cloud/API providers, no local lifecycle)
backend = "mistral_sdk"
max_in_flight = 64
batch_max_size = 128
batch_max_concurrency = 8
model = "Qwen/Qwen3-Embedding-0.6B"
dimension = 1024
timeout = 60

[memory]
# Memory embedding should follow the same local runtime role.
embedding_backend = "mistral_sdk"
embedding_model = "Qwen/Qwen3-Embedding-0.6B"
embedding_dim = 1024
embedding_timeout_ms = 60000
embedding_timeout_cooldown_ms = 20000

[llm.mistral]
# Optional for backend=mistral_sdk:
# HF cache root used by mistralrs to store/reuse model downloads.
# This path must be a HuggingFace cache layout, not an Ollama manifests path.
# sdk_hf_cache_path = ".data/models/hf-cache"
# Optional HF revision pin (for example: "main", "refs/pr/1").
# sdk_hf_revision = "main"
# Optional max embedding scheduler sequence concurrency for mistralrs.
sdk_embedding_max_num_seqs = 128

# External dependency manifests used by xiuxian-wendao dependency indexer.
[[ast_symbols_external]]
type = "rust"
registry = "cargo"
manifests = [
  "~/.cargo/registry/src/**/Cargo.toml",
  "~/.cargo/git/checkouts/**/Cargo.toml",
]

[skills.architecture]
# User-level skill structure overrides.
# AUDIT.md is recommended for internal tracking but not mandatory.
default = [ { path = "AUDIT.md", description = "Internal audit log" } ]

[skills.validation]
# Control the strictness of the skill scanner.
strict_mode = true
