[package]
name = "omni-agent"
version.workspace = true
edition.workspace = true
description = "Minimal Rust agent loop: LLM + MCP tools, single turn (Phase B)"
authors = ["CyberXiuXian Artisan Studio"]
license = "Apache-2.0"
publish = false
default-run = "omni-agent"

[features]
default = ["agent-provider-litellm", "agent-discord"]
agent-provider-litellm = ["dep:litellm-rs"]
agent-discord = []

[dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "sync", "time"] }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
async-trait = "0.1"
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
reqwest = { workspace = true, features = ["multipart"] }
redis = { version = "1.0.3", default-features = false, features = ["tokio-comp"] }
pulldown-cmark = "0.12"
serde_yaml = { workspace = true }
regex = "1"
sha2 = { workspace = true }
hex = { workspace = true }
serenity = { version = "0.12.5", default-features = false, features = ["client", "gateway", "model", "rustls_backend"] }
litellm-rs = { version = "0.3.1", default-features = false, features = ["redis"], optional = true }

toml = { workspace = true }
dirs = "5.0"

omni-memory = { path = "../omni-memory", default-features = false, features = ["valkey"] }
xiuxian-qianhuan = { path = "../xiuxian-qianhuan" }
xiuxian-llm = { path = "../xiuxian-llm" }
omni-window = { path = "../omni-window" }
omni-tokenizer = { path = "../omni-tokenizer" }
xiuxian-zhixing = { path = "../xiuxian-zhixing" }
rmcp = { workspace = true }
axum = { workspace = true, features = ["multipart"] }
clap = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tower = { version = "0.5", features = ["util"] }

[lints]
workspace = true
