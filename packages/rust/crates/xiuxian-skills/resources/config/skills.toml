[architecture]
# Mandatory alignment with pi-coding-agent / Gemini CLI public standards.
required = [
  { path = "SKILL.md", description = "Skill manifest and graph root node", item_type = "file" }
]

# Standard directory layout for automated scaffolding and IDE support.
default = [
  { path = "scripts/", description = "Executable drivers (Python/Bash)", item_type = "dir" },
  { path = "references/", description = "Semantic asset repository (MD/TOML/J2)", item_type = "dir" },
  { path = "assets/", description = "Static attachments and media assets", item_type = "dir" },
  { path = "tests/", description = "Quality assurance suite", item_type = "dir" }
]

[validation]
# Enforcement rules for architectural purity.
strict_mode = true                  # Non-compliant skills will be rejected during indexing.
enforce_references_folder = true    # Non-code assets MUST reside within the references/ directory.
prohibit_logic_in_skill_md = true   # Code blocks (Jinja2/Bash) are strictly forbidden in SKILL.md.
require_yaml_frontmatter = true     # SKILL.md must contain valid omni-scanner metadata.

[validation.semantic]
allow_cross_skill_links = true      # Permit cross-referencing via wendao:// URIs.
require_type_hints = true           # Mandate #type suffixes in WikiLinks for disambiguation.
