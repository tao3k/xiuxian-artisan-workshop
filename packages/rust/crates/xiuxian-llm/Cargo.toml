[package]
name = "xiuxian-llm"
version.workspace = true
edition.workspace = true
description = "LLM/embedding runtime primitives shared across xiuxian and omni-agent"
authors = ["CyberXiuXian Artisan Studio"]
license = "Apache-2.0"
publish = false

[features]
default = []
mistral-accel-metal = ["mistralrs/metal"]
mistral-accel-cuda = ["mistralrs/cuda"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time"] }
tracing = { workspace = true }
redis = { workspace = true, features = ["tokio-comp"] }
sha2 = { workspace = true }
hex = { workspace = true }
rmcp = { workspace = true }
num-traits = "0.2"
xiuxian-mcp = { path = "../xiuxian-mcp" }
xiuxian-macros = { path = "../xiuxian-macros" }

[target.'cfg(target_os = "macos")'.dependencies]
mistralrs = { version = "0.7.0", features = ["metal"] }

[target.'cfg(target_os = "linux")'.dependencies]
mistralrs = { version = "0.7.0", features = ["cuda"] }

[target.'cfg(not(any(target_os = "macos", target_os = "linux")))'.dependencies]
mistralrs = { version = "0.7.0" }

[dev-dependencies]
axum = { workspace = true }

[lints]
workspace = true

[lib]
doctest = false
