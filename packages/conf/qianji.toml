# packages/conf/qianji.toml
# System defaults for xiuxian-qianji runtime.
# User overrides: $PRJ_CONFIG_HOME/xiuxian-artisan-workshop/qianji.toml

[llm]
model = "MiniMax-M2.5"
base_url = "http://localhost:3002/v1"
api_key_env = "MINIMAX_API_KEY"

[memory_promotion.wendao]
graph_scope = "qianji:memory_promotion"
graph_dimension = 1024
persist = true
persist_best_effort = true
