name: "Checks"
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      CARGO_TARGET_DIR: /tmp/workspace-strict-proof
      OMNI_ENABLE_EMBED_ROLE_PERF_GATE: "1"
      OMNI_EMBED_ROLE_PERF_GATE_PROFILE: "medium"
      OMNI_MCP_TOOLS_LIST_REPORT_DIR: ".run/reports/mcp-tools-list-sweep"
      OMNI_MCP_TOOLS_LIST_NO_EMBEDDING: "true"
      OMNI_MCP_TOOLS_LIST_HEALTH_TIMEOUT_SECS: "120"
      OMNI_MCP_TOOLS_LIST_STRICT_SNAPSHOT: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Rust quality gates (check + strict clippy + nextest + omni-core-rs runtime lane)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-quality-gate

      - name: Rust dependency security gate (cargo-audit + cargo-deny)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-security-gate

      - name: Rust gate - omni-core-rs lib runtime lane (explicit)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-omni-core-rs-lib

      - name: Rust gate - omni-agent profile matrix (default + no-default-features)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-omni-agent-profiles

      - name: Rust gate - omni-agent dependency graph assertions
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-omni-agent-dependency-assertions

      - name: Rust gate - omni-agent backend role contracts
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-omni-agent-backend-role-contracts

      - name: Runtime gate - native runtime smoke
        run: secretspec run --provider env --profile default -- devenv tasks run ci:native-runtime-smoke

      - name: MCP gate - tools/list concurrency sweep
        run: secretspec run --provider env --profile default -- devenv tasks run ci:mcp-tools-list-sweep

  telegram-session-isolation-gate:
    runs-on: ubuntu-latest
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Telegram session isolation gate (targeted regressions)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:telegram-session-isolation-rust

      - name: Telegram isolation gate (Python script regressions)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:telegram-session-isolation-python

  nix-build-default:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Build default package
        run: nix build -v

  nix-build-omni-core-rs-python-bindings:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Build omni-core-rs-python-bindings
        run: nix build .\#omni-core-rs-python-bindings -v
