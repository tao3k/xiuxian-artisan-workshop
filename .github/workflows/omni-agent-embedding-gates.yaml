name: "Omni-Agent Embedding Gates"

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Embedding gate profile to run"
        required: true
        type: choice
        options:
          - medium
          - heavy
        default: heavy

jobs:
  embedding-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      CARGO_TARGET_DIR: /tmp/workspace-strict-proof
      OMNI_EMBED_ROLE_PERF_GATE_PROFILE: ${{ github.event_name == 'schedule' && 'heavy' || github.event.inputs.profile }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Run omni-agent embedding role perf gate
        run: |
          case "${OMNI_EMBED_ROLE_PERF_GATE_PROFILE}" in
            medium)
              secretspec run --provider env --profile default -- devenv tasks run ci:rust-omni-agent-embedding-role-perf-medium-gate
              ;;
            heavy)
              secretspec run --provider env --profile default -- devenv tasks run ci:rust-omni-agent-embedding-role-perf-heavy-gate
              ;;
            *)
              echo "Unsupported OMNI_EMBED_ROLE_PERF_GATE_PROFILE='${OMNI_EMBED_ROLE_PERF_GATE_PROFILE}'." >&2
              exit 1
              ;;
          esac

      - name: Upload embedding role perf reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: embedding-role-perf-${{ env.OMNI_EMBED_ROLE_PERF_GATE_PROFILE }}
          path: |
            .run/reports/omni-agent-embedding-role-perf-smoke.medium.json
            .run/reports/omni-agent-embedding-role-perf-smoke.medium.md
            .run/reports/omni-agent-embedding-role-perf-smoke.heavy.json
            .run/reports/omni-agent-embedding-role-perf-smoke.heavy.md
            .run/logs/omni-agent-embedding-role-*.log
          if-no-files-found: warn

      - name: Embedding role perf summary (step summary)
        if: ${{ always() }}
        run: |
          report=".run/reports/omni-agent-embedding-role-perf-smoke.${OMNI_EMBED_ROLE_PERF_GATE_PROFILE}.json"
          markdown=".run/reports/omni-agent-embedding-role-perf-smoke.${OMNI_EMBED_ROLE_PERF_GATE_PROFILE}.md"
          if [ -f "${report}" ]; then
            python3 scripts/render_embedding_role_perf_summary.py \
              --input "${report}" \
              --profile "${OMNI_EMBED_ROLE_PERF_GATE_PROFILE}" \
              --runner-os "${RUNNER_OS}" \
              --output-markdown "${markdown}" \
              >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## Embedding Role Perf (${OMNI_EMBED_ROLE_PERF_GATE_PROFILE}, ${RUNNER_OS})" >> "${GITHUB_STEP_SUMMARY}"
            echo "- report missing: \`${report}\`" >> "${GITHUB_STEP_SUMMARY}"
          fi
